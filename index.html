<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chat_application</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/css/styles.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <main class="app" id="app">
    <section class="auth-screen" id="authScreen">
      <div class="auth-card">
        <h1>chat_application</h1>
        <p>Instagram-like messaging on GitHub Pages.</p>

        <div class="auth-switch">
          <button id="loginTab" class="active" type="button">Login</button>
          <button id="registerTab" type="button">Register</button>
        </div>

        <form id="loginForm" class="auth-form">
          <input id="loginEmail" type="email" placeholder="Email" required />
          <input id="loginPassword" type="password" placeholder="Password" required />
          <button type="submit" class="primary-btn">Login</button>
        </form>

        <form id="registerForm" class="auth-form hidden">
          <input id="registerName" type="text" placeholder="Display name" required />
          <input id="registerEmail" type="email" placeholder="Email" required />
          <input id="registerPassword" type="password" placeholder="Password (min 6 chars)" required />
          <button type="submit" class="primary-btn">Create account</button>
        </form>

        <p class="error" id="authError"></p>
      </div>
    </section>

    <section class="chat-screen hidden" id="chatScreen">
      <aside class="sidebar">
        <header class="sidebar-header">
          <div>
            <h2 id="meName">You</h2>
            <small>@online</small>
          </div>
          <button id="logoutBtn" class="ghost-btn" type="button">Logout</button>
        </header>

        <div class="sidebar-actions">
          <button id="newChatBtn" class="ghost-btn" type="button">New Chat</button>
          <button id="newGroupBtn" class="ghost-btn" type="button">New Group</button>
        </div>

        <h3>Conversations</h3>
        <ul id="conversationList" class="conversation-list"></ul>
      </aside>

      <section class="chat-panel">
        <header class="chat-header">
          <h3 id="chatTitle">Select a conversation</h3>
        </header>

        <div id="messageList" class="message-list"></div>

        <form id="composerForm" class="composer">
          <button id="emojiToggle" type="button" class="icon-btn" title="Emoji">&#9786;</button>
          <label class="icon-btn file-btn" title="Attach GIF/Image">
            +
            <input id="fileInput" type="file" accept="image/*,.gif" />
          </label>
          <input id="messageInput" type="text" placeholder="Message..." autocomplete="off" />
          <button type="submit" class="send-btn">Send</button>
        </form>

        <div id="emojiPanel" class="emoji-panel hidden"></div>
        <div id="attachmentPreview" class="attachment-preview hidden"></div>
      </section>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <h3 id="modalTitle">Create Group</h3>
      <input id="groupNameInput" type="text" placeholder="Group name" />
      <p class="modal-help">Select members:</p>
      <ul id="userPickerList" class="user-picker"></ul>
      <div class="modal-actions">
        <button id="modalCancel" type="button" class="ghost-btn">Cancel</button>
        <button id="modalConfirm" type="button" class="primary-btn">Create</button>
      </div>
    </div>
  </div>

  <script type="module" src="./src/js/app.js"></script>
</body>
</html>
